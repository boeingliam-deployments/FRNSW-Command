<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRNSW Command & Control Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #cc2020;
            --red-bright: #ff3333;
            --green: #27ae60;
            --amber: #e67e22;
            --blue: #2980b9;
            --gold: #f1c40f;
            --bg: #0d0f12;
            --bg2: #13171c;
            --bg3: #1a1f26;
            --border: #252c38;
            --text: #dce6f0;
            --text-dim: #6a7a8a;
            --mono: 'Share Tech Mono', monospace;
            --head: 'Rajdhani', sans-serif;
            --body: 'Barlow', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--body); 
            min-height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: row; 
        }

        /* SIDEBAR */
        .sidebar {
            width: 55px;
            background: var(--bg2);
            border-right: 2px solid var(--red);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            z-index: 200;
        }

        .btn-qrf {
            background: var(--red);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            font-family: var(--head);
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(204, 32, 32, 0.3);
        }
        .btn-qrf:hover { background: var(--red-bright); transform: scale(1.05); }

        /* MAIN WRAPPER */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--bg2);
            border-bottom: 3px solid var(--red);
            padding: 0 1.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .hdr-left { display: flex; align-items: center; gap: 10px; }
        .frnsw-badge { 
            background: var(--red); 
            color: #fff; 
            font-family: var(--head); 
            font-weight: 700; 
            padding: 4px 12px; 
            clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); 
        }

        .btn-ui { border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-family: var(--head); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; transition: opacity 0.2s; }
        .btn-new { background: var(--green); color: white; }
        .btn-edit { background: var(--blue); color: white; }
        .btn-ui:hover { opacity: 0.8; }

        .stats-strip { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); }
        .stat { padding: 0.5rem 1.5rem; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
        .stat-num { font-family: var(--mono); font-size: 1.5rem; color: var(--text); }
        .stat-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }

        .toolbar { display: flex; align-items: flex-end; gap: 0.8rem; padding: 0.8rem 1.5rem; background: var(--bg2); border-bottom: 1px solid var(--border); }
        .tf { display: flex; flex-direction: column; gap: 3px; }
        .tf label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .tf input, .tf select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); padding: 6px; outline: none; border-radius: 2px; }
        .btn-add { background: var(--red); color: #fff; border: none; font-family: var(--head); font-weight: 700; padding: 8px 15px; cursor: pointer; text-transform: uppercase; }

        .main-content { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; padding-bottom: 180px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .command-row { border-left: 4px solid var(--gold); background: rgba(241, 196, 15, 0.05); }
        .cmd-badge { color: var(--gold); font-weight: bold; font-size: 0.7rem; border: 1px solid var(--gold); padding: 1px 4px; border-radius: 3px; margin-right: 5px; }

        .sbtn { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); padding: 4px 8px; cursor: pointer; font-size: 0.65rem; border-radius: 2px; }
        .sbtn.active { border-color: var(--color); color: var(--color); font-weight: bold; background: rgba(255,255,255,0.05); }
        .btn-cmd { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 8px; cursor: pointer; border-radius: 2px; font-size: 0.65rem; }
        .btn-cmd.is-cmd { border-color: var(--gold); color: var(--gold); }

        .log { position: fixed; bottom: 0; right: 0; left: 55px; height: 150px; background: var(--bg2); border-top: 2px solid var(--red); padding: 10px 20px; overflow-y: auto; font-family: var(--mono); font-size: 0.75rem; z-index: 50; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .log-ts { color: var(--amber); margin-right: 10px; }

        /* HUDs */
        .qrf-hud, .notepad-hud {
            position: fixed; top: 80px; left: 70px;
            width: 290px; background: var(--bg2);
            border: 1px solid var(--red); border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            z-index: 1000; display: none; flex-direction: column;
        }
        .qrf-header, .notepad-header { background: var(--red); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: move; }
        .qrf-header span, .notepad-header span { font-family: var(--head); font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; }
        .qrf-body, .notepad-body { padding: 15px; font-family: var(--mono); font-size: 0.8rem; background: var(--bg); }
        
        .notepad-hud { border-color: var(--amber); }
        .notepad-header { background: var(--amber); }
        .notepad-header span { color: #000; }
        .notepad-body textarea { width: 100%; height: 200px; background: transparent; color: white; border: none; resize: none; outline: none; }

        /* INCIDENT TABS */
        .inc-tab-strip { display: flex; overflow-x: auto; flex: 1; margin: 0 1rem; gap: 2px; height: 60px; }
        .inc-tab {
            display: flex; flex-direction: column; justify-content: center; padding: 0 14px;
            cursor: pointer; border-bottom: 3px solid transparent; min-width: 120px; position: relative;
        }
        .inc-tab.active { background: var(--bg3); border-bottom-color: var(--red); }
        .inc-tab-name { font-family: var(--mono); font-size: 0.78rem; font-weight: bold; color: var(--text-dim); }
        .inc-tab.active .inc-tab-name { color: var(--red-bright); }
        .inc-tab-meta { font-size: 0.58rem; color: var(--text-dim); text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .inc-tab-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
        .inc-tab-dot.suspended { background: var(--amber); }

        /* MODALS */
        .modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg2); border: 2px solid var(--border); padding: 2rem; border-radius: 4px; width: 420px; }
        
        .suspended-overlay { position: absolute; inset: 0; background: rgba(13, 15, 18, 0.8); display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .suspended-msg { background: var(--amber); color: #000; padding: 15px 30px; font-family: var(--head); font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="btn-qrf" onclick="toggleQRF()">QRF</button>
    <button class="btn-qrf" onclick="toggleNotepad()" style="margin-top:8px; background:var(--bg3);">NOTE</button>
</div>

<div class="app-container">
    <header>
        <div class="hdr-left">
            <div class="frnsw-badge">FRNSW</div>
            <button class="btn-ui btn-new" onclick="createNewIncident()">+ New</button>
            <button class="btn-ui btn-edit" onclick="openEditModal()">Manage</button>
        </div>
        <div id="incTabStrip" class="inc-tab-strip"></div>
        <div id="clock" style="font-family: var(--mono); color: var(--amber); font-size: 1.1rem;">00:00:00</div>
    </header>

    <div class="stats-strip">
        <div class="stat"><div class="stat-num" id="stat-responding">0</div><div class="stat-label">Responding</div></div>
        <div class="stat"><div class="stat-num" id="stat-scene">0</div><div class="stat-label">On Scene</div></div>
        <div class="stat"><div class="stat-num" id="stat-returning">0</div><div class="stat-label">Returning</div></div>
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    </div>

    <div class="toolbar" id="toolbar">
        <div class="tf"><label>Callsign</label><input type="text" id="inCS" placeholder="ZETLAND 1"></div>
        <div class="tf"><label>Type</label><input type="text" id="inType" placeholder="Pumper"></div>
        <div class="tf">
            <label>Role</label>
            <select id="inIsCmd">
                <option value="false">Standard</option>
                <option value="true">IC / Command</option>
            </select>
        </div>
        <button class="btn-add" onclick="addUnit()">Assign Unit</button>
    </div>

    <div class="main-content" id="main-content">
        <table id="unit-table">
            <thead>
                <tr>
                    <th>Callsign</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Sector / Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="unitTableBody"></tbody>
        </table>
    </div>
</div>

<div id="qrfHud" class="qrf-hud">
    <div class="qrf-header" id="qrfHeader">
        <span>QRF / CODES</span>
        <button onclick="toggleQRF()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div class="qrf-body">
        <p style="color:var(--amber); margin-bottom:5px;">STATUS CODES</p>
        <div>1: Responding | 3: On Scene</div>
        <div>4: Available | 7: Unavailable</div>
    </div>
</div>

<div id="notepadHud" class="notepad-hud">
    <div class="notepad-header" id="notepadHeader">
        <span>📝 NOTEPAD</span>
        <button onclick="toggleNotepad()" style="background:none; border:none; color:black; cursor:pointer;">✕</button>
    </div>
    <div class="notepad-body">
        <textarea id="notepadText" placeholder="Scratchpad..." oninput="localStorage.setItem('frnsw_notepad', this.value)"></textarea>
    </div>
</div>

<div class="modal-wrap" id="editModal">
    <div class="modal-box">
        <h3 style="font-family:var(--head); margin-bottom:1rem; color:var(--red);">INCIDENT MANAGEMENT</h3>
        <div class="tf" style="margin-bottom:1rem;"><label>Name</label><input type="text" id="editName" style="width:100%"></div>
        <div class="tf" style="margin-bottom:1rem;">
            <label>Status</label>
            <select id="editStatus" style="width:100%">
                <option value="active">Active</option>
                <option value="suspended">Suspended</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="saveEdit()" class="btn-add" style="flex:1">Save</button>
            <button onclick="deleteCurrentIncident()" class="btn-add" style="flex:1; background:var(--bg3);">Delete</button>
            <button onclick="closeEditModal()" class="btn-add" style="flex:1; background:var(--bg3);">Cancel</button>
        </div>
    </div>
</div>

<div class="log" id="log"></div>

<script>
    let store = JSON.parse(localStorage.getItem('frnsw_v3') || '{"activeId": null, "incidents": []}');
    const STATUSES = ['responding', 'scene', 'returning', 'available'];

    // STORAGE HELPERS
    function save() { localStorage.setItem('frnsw_v3', JSON.stringify(store)); }
    function getActive() { return store.incidents.find(i => i.id === store.activeId); }

    // HUD DRAGGING
    function makeDraggable(el, handle) {
        let dragging = false, ox = 0, oy = 0;
        handle.addEventListener('mousedown', e => {
            dragging = true;
            ox = el.offsetLeft - e.clientX;
            oy = el.offsetTop - e.clientY;
        });
        document.addEventListener('mouseup', () => dragging = false);
        document.addEventListener('mousemove', e => {
            if (dragging) { el.style.left = (e.clientX + ox) + 'px'; el.style.top = (e.clientY + oy) + 'px'; }
        });
    }
    makeDraggable(document.getElementById('qrfHud'), document.getElementById('qrfHeader'));
    makeDraggable(document.getElementById('notepadHud'), document.getElementById('notepadHeader'));

    function toggleQRF() { const h = document.getElementById('qrfHud'); h.style.display = (h.style.display === 'flex' ? 'none' : 'flex'); }
    function toggleNotepad() { const h = document.getElementById('notepadHud'); h.style.display = (h.style.display === 'flex' ? 'none' : 'flex'); }

    // INCIDENT MANAGEMENT
    function createNewIncident() {
        const name = prompt("Incident Identifier:");
        if (!name) return;
        const newInc = {
            id: Date.now(),
            name: name.toUpperCase(),
            units: [],
            logs: [{ts: new Date().toLocaleTimeString(), msg: "Incident Created"}],
            status: 'active'
        };
        store.incidents.push(newInc);
        store.activeId = newInc.id;
        save(); render();
    }

    function switchIncident(id) { store.activeId = id; save(); render(); }

    function openEditModal() {
        const inc = getActive();
        if (!inc) return;
        document.getElementById('editName').value = inc.name;
        document.getElementById('editStatus').value = inc.status;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    function saveEdit() {
        const inc = getActive();
        inc.name = document.getElementById('editName').value.toUpperCase();
        inc.status = document.getElementById('editStatus').value;
        save(); render(); closeEditModal();
    }

    function deleteCurrentIncident() {
        if(!confirm("Delete this incident and all data?")) return;
        store.incidents = store.incidents.filter(i => i.id !== store.activeId);
        store.activeId = store.incidents.length ? store.incidents[0].id : null;
        save(); render(); closeEditModal();
    }

    // UNIT OPERATIONS
    function addUnit() {
        const inc = getActive();
        if (!inc || inc.status === 'suspended') return;
        const cs = document.getElementById('inCS').value.toUpperCase();
        if (!cs) return;
        inc.units.push({
            id: Date.now(),
            cs: cs,
            type: document.getElementById('inType').value || 'APPLIANCE',
            status: 'responding',
            location: '',
            isCmd: document.getElementById('inIsCmd').value === 'true'
        });
        inc.logs.unshift({ts: new Date().toLocaleTimeString(), msg: `${cs} assigned.`});
        document.getElementById('inCS').value = '';
        save(); render();
    }

    function setStatus(unitId, status) {
        const inc = getActive();
        const unit = inc.units.find(u => u.id === unitId);
        unit.status = status;
        inc.logs.unshift({ts: new Date().toLocaleTimeString(), msg: `${unit.cs} is now ${status}.`});
        save(); render();
    }

    function updateNote(unitId, text) {
        const inc = getActive();
        const unit = inc.units.find(u => u.id === unitId);
        unit.location = text;
        save(); // Real-time saving
    }

    function toggleCommand(unitId) {
        const inc = getActive();
        const unit = inc.units.find(u => u.id === unitId);
        unit.isCmd = !unit.isCmd;
        save(); render();
    }

    function removeUnit(unitId) {
        const inc = getActive();
        inc.units = inc.units.filter(u => u.id !== unitId);
        save(); render();
    }

    // RENDER UI
    function render() {
        const strip = document.getElementById('incTabStrip');
        const body = document.getElementById('unitTableBody');
        const main = document.getElementById('main-content');
        const inc = getActive();

        // Tabs
        strip.innerHTML = store.incidents.map(i => `
            <div class="inc-tab ${i.id === store.activeId ? 'active' : ''}" onclick="switchIncident(${i.id})">
                <div class="inc-tab-name">${i.name}</div>
                <div class="inc-tab-meta">
                    <span class="inc-tab-dot ${i.status === 'suspended' ? 'suspended' : ''}"></span>
                    ${i.status}
                </div>
            </div>
        `).join('');

        if (!inc) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding-top:40px;">No incidents active.</td></tr>';
            return;
        }

        // Stats
        document.getElementById('stat-total').textContent = inc.units.length;
        STATUSES.filter(s => s !== 'available').forEach(s => {
            document.getElementById('stat-'+s).textContent = inc.units.filter(u => u.status === s).length;
        });

        // Suspended Overlay
        const existing = main.querySelector('.suspended-overlay');
        if (existing) existing.remove();
        if (inc.status === 'suspended') {
            const div = document.createElement('div');
            div.className = 'suspended-overlay';
            div.innerHTML = '<div class="suspended-msg">Operations Paused</div>';
            main.appendChild(div);
        }

        // Table
        body.innerHTML = inc.units.sort((a,b) => b.isCmd - a.isCmd).map(u => `
            <tr class="${u.isCmd ? 'command-row' : ''}">
                <td><div style="font-weight:bold;">${u.isCmd ? '<span class="cmd-badge">IC</span>' : ''}${u.cs}</div></td>
                <td style="color:var(--blue); font-size:0.75rem;">${u.type}</td>
                <td>
                    <div style="display:flex; gap:3px;">
                        ${STATUSES.map(s => `<button class="sbtn ${u.status === s ? 'active' : ''}" style="--color: var(--${s === 'responding' ? 'amber' : s === 'scene' ? 'red-bright' : 'blue'})" onclick="setStatus(${u.id}, '${s}')">${s.charAt(0).toUpperCase()}</button>`).join('')}
                    </div>
                </td>
                <td><input class="tf" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);" value="${u.location}" oninput="updateNote(${u.id}, this.value)"></td>
                <td>
                    <button class="btn-cmd ${u.isCmd ? 'is-cmd' : ''}" onclick="toggleCommand(${u.id})">CMD</button>
                    <button class="btn-cmd" onclick="removeUnit(${u.id})">✕</button>
                </td>
            </tr>
        `).join('');

        document.getElementById('log').innerHTML = inc.logs.map(l => `<div class="log-entry"><span class="log-ts">[${l.ts}]</span> ${l.msg}</div>`).join('');
    }

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('notepadText').value = localStorage.getItem('frnsw_notepad') || '';
    render();
</script>

</body>
</html>
